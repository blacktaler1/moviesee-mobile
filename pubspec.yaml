name: moviesee
description: Synchronized movie watching app with voice chat
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # HTTP
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # Video Player (media_kit — actively maintained, supports AGP 8.3+)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5

  # WebRTC (voice chat)
  flutter_webrtc: ^1.4.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Firebase Push Notifications
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.1.0

  # Logging (user's preferred stack — same as dewibe_erp, rentifyapp)
  talker: ^4.4.1
  talker_flutter: ^4.4.1
  talker_dio_logger: ^4.4.1
  talker_riverpod_logger: ^4.4.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
